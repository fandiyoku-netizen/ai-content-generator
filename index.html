<!DOCTYPE html>
<html>
<head>
  <title>AI Content Generator</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    textarea, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .output {
      margin-top: 15px;
      background: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      min-height: 50px;
    }

    .loading {
      color: gray;
      font-style: italic;
    }

    .copy-btn {
      margin-top: 5px;
      background: #007bff;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>🔥 AI Content Generator</h2>

    <textarea id="input" placeholder="Tulis ide kamu..."></textarea>

    <select id="type">
      <option value="caption">Caption IG</option>
      <option value="artikel">Artikel</option>
      <option value="chat">Chat AI</option>
    </select>

    <button onclick="generate()">Generate</button>

    <div class="output" id="output"></div>
    <button class="copy-btn" onclick="copyText()">Copy</button>
  </div>

  <script>
    async function generate() {
      const prompt = document.getElementById("input").value;
      const type = document.getElementById("type").value;
      const output = document.getElementById("output");

      output.innerHTML = "<span class='loading'>Generating...</span>";

      const res = await fetch("/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt, type })
      });

      const data = await res.json();
      output.innerText = data.result;
    }

    function copyText() {
      const text = document.getElementById("output").innerText;
      navigator.clipboard.writeText(text);
      alert("Copied!");
    }
  </script>
</body>
</html>
